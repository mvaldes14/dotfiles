onboarding = false
# herdr config — keymaps ported from tmux. Apply edits with: herdr server reload-config

[keys]
prefix = "ctrl+space"

split_vertical = "prefix+v"
split_horizontal = "prefix+h"
close_pane = "prefix+w"

focus_pane_left = "ctrl+h"
focus_pane_down = "ctrl+j"
focus_pane_up = "ctrl+k"
focus_pane_right = "ctrl+l"
resize_mode = "prefix+shift+r"

new_tab = "prefix+t"
next_tab = "prefix+tab"
cycle_pane_next = ""

new_workspace = "prefix+n"
workspace_picker = "prefix+o"
goto = "prefix+s"
navigate_workspace_up = "j"
navigate_workspace_down = "k"

reload_config = "prefix+r"
detach = "prefix+ctrl+d"
rename_tab = "prefix+,"

[[keys.command]]
key = "prefix+f"
type = "pane"
command = "~/.local/bin/herdr-sessionizer.sh"

[theme]
name = "terminal"
auto_switch = false

[theme.custom]
# surface0 = selected sidebar row + tab bg; keep it dark.
# Alts: purple80 #491d8b, magenta80 #740937, green70 #0e6027, blue80 #002d9c
surface0 = "#005d5d" # oxocarbon teal70

[ui.toast]
delivery = "terminal"

[ui]
show_agent_labels_on_pane_borders = true
sidebar_width = 20
