# herdr configuration
# Keymaps ported from ~/.config/tmux/tmux.conf
# Concept mapping: tmux window -> herdr tab, tmux session -> herdr workspace.
# Apply after editing with: herdr server reload-config
#
# NOTE: herdr reads ~/.config/herdr/config.toml. Symlink/stow this file there
# (that dir currently holds runtime sockets/logs but no config.toml).

[keys]
# tmux: set -g prefix C-space
prefix = "ctrl+space"

# --- Panes ---
# tmux: bind v / C-v  split-window -h   (side-by-side)
split_vertical = "prefix+v"
# tmux: bind h / C-h  split-window -v   (stacked)
# If the geometry ends up flipped vs tmux, swap split_vertical/split_horizontal.
split_horizontal = "prefix+h"

# tmux: bind w / C-w  kill-pane
close_pane = "prefix+w"

# Pane navigation. Your tmux uses christoomey/vim-tmux-navigator: ctrl+h/j/k/l
# with no prefix, moving seamlessly between tmux panes AND neovim splits.
# herdr has no vim-tmux-navigator plugin, so these only move between herdr panes
# (the neovim-split integration is lost). Also note ctrl+j == Enter and
# ctrl+l == clear in most shells; if that bites, fall back to prefix+h/j/k/l.
focus_pane_left = "ctrl+h"
focus_pane_down = "ctrl+j"
focus_pane_up = "ctrl+k"
focus_pane_right = "ctrl+l"

# tmux: bind -n C-M-h/j/k/l resize-pane (direct directional resize).
# herdr has no per-direction resize bind, only a resize MODE (enter, then use
# h/j/k/l or arrows to resize, esc to exit). Moved off prefix+r (taken below).
resize_mode = "prefix+shift+r"

# --- Tabs (== tmux windows) ---
# tmux: bind t / C-t  new-window
new_tab = "prefix+t"
# tmux: bind Tab last-window. herdr has no last-tab toggle; closest is cycling.
# (Disabling pane-cycle below so prefix+tab is free for tab switching.)
next_tab = "prefix+tab"
cycle_pane_next = ""

# --- Workspaces (== tmux sessions) ---
# tmux: bind n / C-n  new-session
new_workspace = "prefix+n"
# workspace_picker default is prefix+w, which now belongs to close_pane; move it.
workspace_picker = "prefix+s"
navigate_workspace_up = "j"
navigate_workspace_down = "k"

# --- Misc ---
# tmux: bind r  source-file ~/.config/tmux/tmux.conf (reload)
reload_config = "prefix+r"
# tmux: bind C-d detach-client
detach = "prefix+ctrl+d"

# tmux: prefix+,  rename-window
rename_tab = "prefix+,"

# --- Custom commands ---
# tmux: bind f run-shell "tmux neww ~/.local/bin/tmux-sessionizer.sh"
# WARNING: that script drives tmux directly (tmux neww / new-session) and will
# NOT work under herdr as-is. Rewrite it against herdr's CLI
# (herdr workspace ... / herdr tab ...) before relying on this.
[[keys.command]]
key = "prefix+f"
type = "pane"
command = "~/.local/bin/tmux-sessionizer.sh"

# --- Not ported (no herdr equivalent) ---
# - synchronize-panes (bind C-y): herdr has no synchronize-panes action.
# - switch-client -l (bind l): herdr has no "last client/workspace" toggle.
# Already handled by herdr, so not carried over:
# - copy-mode vi keys (v/y): herdr's built-in copy mode already uses
#   v/space to select and y/enter to copy.
# - mouse on: herdr enables mouse capture by default ([ui] mouse_capture = true).
# - clipboard/base-index/escape-time/history-limit/theme/plugins: not keymaps.

[theme]
name = "tokyo-night"
auto_switch = false

[ui.toast]
delivery = "herdr"

[ui]
show_agent_labels_on_pane_borders = true
